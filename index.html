<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>粒子弓箭世界 v0.5.0 — Particle Archery</title>
  <link rel="stylesheet" href="css/style.css?v=0.5.1">
</head>
<body>
  <div id="header">
    <div id="header-content">
      <h1>⬛ 粒子弓箭世界</h1>
      <p>所有物品由最小粒子构成 · 横屏剖面视角 · 拉弓射箭</p>
    </div>
    <button id="update-btn" type="button" title="应用弓身更新 / 检查新版本 / 刷新缓存">更新</button>
    <span id="update-status" class="update-status"></span>
    <button id="debug-toggle-btn" type="button" class="active">隐藏调试</button>
    <a href="bow-editor.html?v=0.5.1" class="editor-link">弓身绘制</a>
  </div>

  <div id="app-body">
    <div id="game-column">
      <div id="game-container">
        <canvas id="game-canvas" width="960" height="540"></canvas>

        <div id="hud">
          <div class="hud-panel">
            <div><span class="label">张力 </span><span class="value" id="tension-value">0%</span></div>
            <div id="tension-bar-container"><div id="tension-bar"></div></div>
            <div><span class="label">得分 </span><span class="value" id="score-value">0</span></div>
            <div><span class="label">箭矢 </span><span class="value" id="arrow-count">∞</span></div>
          </div>
        </div>

        <div id="phase-badge">阶段 1-5 · 粒子弓射箭 <span id="version-badge">v0.5.0</span></div>
        <div id="score-popup"></div>
      </div>

      <aside id="debug-panel">
        <div id="debug-toolbar">
          <span id="debug-title">调试日志</span>
          <div id="debug-actions">
            <button id="debug-clear-btn" type="button">清空</button>
            <button id="debug-copy-btn" type="button">复制</button>
          </div>
        </div>
        <div id="debug-log"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="js/main.js?v=0.5.1"></script>
</body>
</html>

name: Auto Merge AI PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to merge (optional, defaults to triggering PR)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'cursor/')
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark draft PR as ready
        if: github.event_name == 'pull_request' && github.event.pull_request.draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready "${{ steps.pr.outputs.number }}"
          echo "Draft PR marked ready; merge runs on ready_for_review event."

      - name: Validate project files
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run validation checks
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft
        run: |
          test -f index.html
          test -f bow-editor.html
          test -f js/main.js
          test -f js/version.js
          echo "Validation passed."

      - name: Merge PR
        id: merge
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          STATE=$(gh pr view "$PR" --json state -q .state)
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR is $STATE, skipping."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh pr merge "$PR" --squash --delete-branch
          echo "PR #$PR merged successfully."
          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy on main
        if: steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Deploy to GitHub Pages" --ref main --repo "${{ github.repository }}"
          echo "Triggered Deploy to GitHub Pages on main."
